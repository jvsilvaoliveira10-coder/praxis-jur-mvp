<?xml version="1.0" encoding="UTF-8"?>
<svg width="380" height="120" viewBox="0 0 380 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ícone da Balança com Circuitos - Versão Monocromática Branca -->
  <g id="icon">
    <!-- Base da balança -->
    <rect x="58" y="35" width="4" height="40" rx="2" fill="white"/>
    
    <!-- Barra horizontal -->
    <rect x="30" y="53" width="60" height="3" rx="1.5" fill="white"/>
    
    <!-- Cordas -->
    <rect x="37" y="40" width="1" height="13" fill="white"/>
    <rect x="82" y="40" width="1" height="13" fill="white"/>
    
    <!-- Pratos -->
    <rect x="28" y="38" width="20" height="2" rx="1" fill="white"/>
    <rect x="72" y="38" width="20" height="2" rx="1" fill="white"/>
    
    <!-- Pontos de circuito com brilho -->
    <circle cx="33" cy="30" r="3" fill="white">
      <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="87" cy="30" r="3" fill="white">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="48" cy="78" r="3" fill="white">
      <animate attributeName="opacity" values="1;0.7;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="72" cy="78" r="3" fill="white">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Linhas de circuito -->
    <rect x="36" y="32" width="17" height="1" fill="white" opacity="0.6"/>
    <rect x="67" y="32" width="17" height="1" fill="white" opacity="0.6"/>
    <rect x="50" y="60" width="1" height="18" fill="white" opacity="0.6"/>
    <rect x="69" y="60" width="1" height="18" fill="white" opacity="0.6"/>
  </g>
  
  <!-- Texto -->
  <text x="110" y="70" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="white">Práxis Jur</text>
  <text x="112" y="88" font-family="Calibri, sans-serif" font-size="11" letter-spacing="2" fill="white" opacity="0.7">HUB JURÍDICO INTELIGENTE</text>
</svg>
